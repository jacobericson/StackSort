# baseline.ini — frozen reference config.
# Mirrors the compiled defaults in src/Packer.cpp and PackerScoring.cpp.
# Every other config inherits from this one (the harness loads baseline.ini
# first, then applies the target config on top).
#
# DO NOT change this file once ablation results exist against it. Make a
# v2_baseline.ini instead so historical runs stay comparable.

[search]
num_restarts = 16
iters_per_restart = 4000
lahc_history_len = 200
plateau_threshold = 1500

[moves]
swap_pct = 50
insert_pct = 25
rotate_pct = 15
# repair_pct is implicit: 100 - (swap + insert + rotate) = 10

[refine]
num_restarts = 24
iters_per_restart = 8000
lahc_history_len = 200
plateau_threshold = 2000
stranded_max = 0
item_threshold = 20

[scoring]
grouping_weight = 1
frag_weight = 50
grouping_power_quarters = 6

# Tiered grouping: soft track disabled in baseline. Exact-match track is
# always on (bit-equivalent to legacy scoring). soft_grouping_pct = 0 means
# no contribution from non-exact tier matches; the other tier_weight_* and
# function_sim_* values are retained so variant configs can re-enable the
# soft track without re-specifying them.
tier_weight_exact = 100
tier_weight_custom = 70
tier_weight_type = 50
tier_weight_function = 40
tier_weight_flags = 30
function_sim_food_food_restricted = 50
function_sim_firstaid_robotrepair = 50
soft_grouping_pct = 0

[skyline]
waste_coef = 3

[features]
enable_baf_seed = true
enable_unconstrained_fallback = true
enable_optimize_grouping = true
enable_fast_converge = true
enable_pre_reservation = true
enable_repair_move = true
