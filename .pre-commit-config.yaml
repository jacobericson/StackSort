repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.3
    hooks:
      - id: clang-format
        types_or: [c, c++]
        files: ^(src|tests/harness)/.*\.(cpp|h)$

  # Advisory clang-tidy: prints findings but does not block commits.
  # WarningsAsErrors: '' in tests/harness/.clang-tidy keeps findings non-fatal.
  # Scoped to files that appear in tests/harness/compile_commands.json — other
  # src/ files (StackSort.cpp, SortWorker.cpp, etc.) need KenshiLib/MyGUI
  # headers to parse, which aren't on the harness clang-tidy setup.
  # Requires a one-time 'python tests/harness/gen_compile_commands.py' on fresh
  # clones to produce the compilation database.
  - repo: local
    hooks:
      - id: clang-tidy
        name: clang-tidy (advisory)
        entry: clang-tidy -p tests/harness --config-file=tests/harness/.clang-tidy --quiet
        language: system
        types_or: [c, c++]
        files: ^(src/Packer.*|tests/harness/.*)\.(cpp|h)$
        require_serial: true
        verbose: true    # always show findings even when hook passes
